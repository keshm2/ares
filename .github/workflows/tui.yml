# Phase 13: TUI package CI — typecheck, build, and a non-interactive
# smoke run. The repo's live config/state files are gitignored, so the
# smoke test only exercises commands that tolerate their absence.
# app/ depends on the shared @applyr/core workspace package (packages/core),
# so installs/builds run from the repo root rather than app/ standalone.
name: tui
on:
  push:
    paths: ["app/**", "packages/core/**", "package.json", "package-lock.json", ".github/workflows/tui.yml"]
  pull_request:
    paths: ["app/**", "packages/core/**", "package.json", "package-lock.json", ".github/workflows/tui.yml"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build --workspace=@applyr/core
      - run: npm run typecheck --workspace=app
      - run: npm run build --workspace=app
      - run: npm run smoke --workspace=app
